<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Enterprise PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {margin:0; font-family:Arial; display:flex; height:100vh;}
.sidebar {width:260px; background:#020617; color:#00ffcc; padding:15px;}
.sidebar button {width:100%; padding:10px; margin:5px 0; background:#00ffcc; border:none; font-weight:bold;}
.main {flex:1; background:#0f172a; padding:15px; color:#fff;}
input {width:100%; padding:8px; margin:5px 0;}
#map {height:400px; margin-top:10px;}
.result {background:#000; padding:10px; margin-top:10px;}
</style>
</head>
<body>

<div class="sidebar">
<h3>Survey PRO MAX</h3>
<button onclick="setMode('jarak')">Jarak & Azimuth</button>
<button onclick="setMode('rec')">REC</button>
<button onclick="setMode('sudut')">Sudut Segitiga</button>
<button onclick="setMode('resection')">Resection</button>
<button onclick="setMode('offside')">Offside</button>
<button onclick="setMode('pancang')">Pancang</button>
<button onclick="setMode('nav')">Navigasi</button>
<button onclick="setMode('gps')">GPS + Kompas</button>
</div>

<div class="main">
<h3 id="title">Mode</h3>

<input id="n1" placeholder="N1 / Lat">
<input id="e1" placeholder="E1 / Lon">
<input id="n2" placeholder="N2 / Target Lat">
<input id="e2" placeholder="E2 / Target Lon">
<input id="extra" placeholder="Extra (jarak/sudut)">

<button onclick="hitung()">HITUNG</button>
<button onclick="startGPS()">START GPS</button>
<button onclick="stopGPS()">STOP</button>

<div class="result" id="output"></div>
<div id="map"></div>
</div>

<script>
let mode='jarak'
function setMode(m){mode=m; title.innerHTML="Mode: "+m}

let map=L.map('map').setView([-6.2,106.8],13)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
let mUser,mTarget

function updateMap(lat,lon,tlat,tlon){
if(mUser) map.removeLayer(mUser)
if(mTarget) map.removeLayer(mTarget)
mUser=L.marker([lat,lon]).addTo(map)
mTarget=L.marker([tlat,tlon]).addTo(map)
}

function degToRad(d){return d*Math.PI/180}
function radToDeg(r){return r*180/Math.PI}

function hitung(){
let N1=+n1.value,E1=+e1.value,N2=+n2.value,E2=+e2.value
let dx=E2-E1, dy=N2-N1

if(mode=='jarak'){
let d=Math.sqrt(dx*dx+dy*dy)
let az=radToDeg(Math.atan2(dx,dy)); if(az<0) az+=360
output.innerHTML=`Jarak ${d.toFixed(3)}<br>AZ ${az.toFixed(3)}`
}

if(mode=='rec'){
let d=N2, az=E2
let dx=d*Math.sin(degToRad(az))
let dy=d*Math.cos(degToRad(az))
output.innerHTML=`ΔE ${dx.toFixed(3)} ΔN ${dy.toFixed(3)}`
}

if(mode=='sudut'){
let A=N1,B=E1,C=N2
let ang=Math.acos((A*A+B*B-C*C)/(2*A*B))
output.innerHTML=`Sudut ${radToDeg(ang).toFixed(3)}`
}

if(mode=='resection'){
let d=Math.sqrt(dx*dx+dy*dy)
output.innerHTML=`Approx posisi ${d.toFixed(2)}`
}

if(mode=='offside'){
let off=N2, az=E2
let dx=off*Math.sin(degToRad(az))
let dy=off*Math.cos(degToRad(az))
output.innerHTML=`Offset ${(E1+dx).toFixed(3)}, ${(N1+dy).toFixed(3)}`
}

if(mode=='pancang'){
output.innerHTML=`ΔN ${(N2-N1)} ΔE ${(E2-E1)}`
}

if(mode=='nav'){
let d=Math.sqrt(dx*dx+dy*dy)
let az=radToDeg(Math.atan2(dx,dy))
output.innerHTML=`Jarak ${d.toFixed(2)} AZ ${az.toFixed(2)}`
}
}

// GPS + KOMPA S
let watchID=null
let heading=0

window.addEventListener("deviceorientation", e=>{
if(e.alpha!=null) heading=360-e.alpha
})

function startGPS(){
watchID=navigator.geolocation.watchPosition(updateGPS)
}

function stopGPS(){navigator.geolocation.clearWatch(watchID)}

function updateGPS(pos){
let lat=pos.coords.latitude
let lon=pos.coords.longitude
let tlat=+n2.value, tlon=+e2.value

let dLat=degToRad(tlat-lat)
let dLon=degToRad(tlon-lon)
let a=Math.sin(dLat/2)**2+Math.cos(degToRad(lat))*Math.cos(degToRad(tlat))*Math.sin(dLon/2)**2
let dist=6371000*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))

let y=Math.sin(dLon)*Math.cos(degToRad(tlat))
let x=Math.cos(degToRad(lat))*Math.sin(degToRad(tlat))-Math.sin(degToRad(lat))*Math.cos(degToRad(tlat))*Math.cos(dLon)
let az=radToDeg(Math.atan2(y,x)); if(az<0) az+=360

let diff=az-heading

let arah="MAJU"
if(diff>20) arah="KANAN "+(dist*Math.sin(degToRad(diff))).toFixed(2)+" m"
if(diff<-20) arah="KIRI "+(dist*Math.sin(degToRad(-diff))).toFixed(2)+" m"
if(Math.abs(diff)<20) arah="MAJU "+dist.toFixed(2)+" m"

output.innerHTML=`GPS ${lat.toFixed(6)},${lon.toFixed(6)}<br>Heading ${heading.toFixed(1)}°<br>Target AZ ${az.toFixed(1)}°<br><b>${arah}</b>`

updateMap(lat,lon,tlat,tlon)
}
</script>

</body>
</html>
