<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Survey Engineer PRO Training</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:#e5e7eb;}
header { background:#020617; padding:12px; text-align:center; font-weight:bold;}
.nav { display:flex; overflow:auto; background:#1e293b;}
.nav button { flex:1; padding:10px; border:none; background:#1e293b; color:white;}
.nav button.active { background:#22c55e; }
.container { padding:15px; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-bottom:15px;}
input,button { padding:7px; margin:4px; border:none; border-radius:6px;}
input { width:110px;}
button { background:#22c55e; color:white; cursor:pointer;}
.hidden { display:none;}
.cut { color:#ef4444; font-weight:bold;}
.fill { color:#38bdf8; font-weight:bold;}
table { width:100%; border-collapse:collapse;}
th,td { border:1px solid #334155; padding:5px; text-align:center;}
.big { font-size:18px; font-weight:bold; }
</style>
</head>

<body>

<header>📐 SURVEY ENGINEER PRO (TRAINING MODE)</header>

<div class="nav">
<button onclick="showTab(event,'wp')" class="active">Waterpass</button>
<button onclick="showTab(event,'slope')">Slope</button>
<button onclick="showTab(event,'jarak')">Jarak</button>
<button onclick="showTab(event,'pancang')">Pancang</button>
<button onclick="showTab(event,'profil')">Profil</button>
</div>

<div class="container">

<!-- WATERPASS -->
<div id="wp" class="card">
<h3>Waterpass</h3>
<input id="elevAwal" placeholder="Elev Awal">
<input id="bs" placeholder="BS">
<input id="fs" placeholder="FS">
<button onclick="tambahWP()">Tambah</button>
<button onclick="sampleWP()">ISI CONTOH</button>
<button onclick="resetWP()">HAPUS</button>

<table id="twp">
<tr><th>No</th><th>BS</th><th>FS</th><th>HI</th><th>Elev</th></tr>
</table>
<p class="big" id="lastElev"></p>
</div>

<!-- SLOPE -->
<div id="slope" class="card hidden">
<h3>Slope</h3>
<input id="selev"><input id="sjarak"><input id="sslope">
<button onclick="hSlope()">Hitung</button>
<button onclick="sampleSlope()">ISI CONTOH</button>
<p id="outSlope"></p>
</div>

<!-- JARAK -->
<div id="jarak" class="card hidden">
<h3>Jarak</h3>
<input id="n1"><input id="e1"><input id="n2"><input id="e2">
<button onclick="hJarak()">Hitung</button>
<button onclick="sampleJarak()">ISI CONTOH</button>
<p id="outJarak"></p>
</div>

<!-- PANCANG -->
<div id="pancang" class="card hidden">
<h3>Pancang</h3>
<input id="na"><input id="ea"><input id="nt"><input id="et">
<button onclick="hPancang()">Hitung</button>
<button onclick="samplePancang()">ISI CONTOH</button>
<p id="outPancang"></p>
</div>

<!-- PROFIL -->
<div id="profil" class="card hidden">
<h3>Profil + Cut Fill</h3>
<input id="ch"><input id="ex"><input id="des">
<button onclick="addProfil()">Tambah</button>
<button onclick="sampleProfil()">ISI CONTOH</button>
<button onclick="resetProfil()">HAPUS</button>

<table id="tprofil">
<tr><th>No</th><th>Ch</th><th>Ex</th><th>Des</th><th>Δ</th><th>Tipe</th></tr>
</table>

<input id="lebar" placeholder="Lebar">
<input id="interval" placeholder="Interval">
<button onclick="calcVol()">Hitung Volume</button>

<p id="total"></p>
<canvas id="chart"></canvas>
</div>

</div>

<script>
function showTab(evt,id){
document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
evt.target.classList.add("active");
}

// WATERPASS
let elev=0,no=1;
function tambahWP(){
let awal=parseFloat(elevAwal.value);
let bsV=parseFloat(bs.value);
let fsV=parseFloat(fs.value);
if(no==1) elev=awal;

let HI=elev+bsV;
elev=HI-fsV;

let r=twp.insertRow();
r.insertCell(0).innerHTML=no++;
r.insertCell(1).innerHTML=bsV;
r.insertCell(2).innerHTML=fsV;
r.insertCell(3).innerHTML=HI.toFixed(3);
r.insertCell(4).innerHTML=elev.toFixed(3);

lastElev.innerHTML="Elev: "+elev.toFixed(3);
}
function sampleWP(){
elevAwal.value=17.989; bs.value=1.449; fs.value=1.286; tambahWP();
bs.value=1.500; fs.value=1.320; tambahWP();
}
function resetWP(){ location.reload(); }

// SLOPE
function hSlope(){
let e=+selev.value,j=+sjarak.value,s=+sslope.value;
outSlope.innerHTML="Elev akhir="+(e-(j*s/100)).toFixed(3);
}
function sampleSlope(){ selev.value=18.332; sjarak.value=25; sslope.value=2; }

// JARAK
function hJarak(){
let d=Math.sqrt((n2.value-n1.value)**2+(e2.value-e1.value)**2);
outJarak.innerHTML="Jarak="+d.toFixed(3);
}
function sampleJarak(){
n1.value=9333261.656; e1.value=633700.567;
n2.value=9333425.193; e2.value=633702.701;
}

// PANCANG
function hPancang(){
outPancang.innerHTML="ΔN="+(nt.value-na.value)+" ΔE="+(et.value-ea.value);
}
function samplePancang(){
na.value=9333300; ea.value=633700;
nt.value=9333320; et.value=633710;
}

// PROFIL
let prof=[],chart;
function addProfil(){
let d=ex.value-des.value;
let t=d>0?"CUT":"FILL";
prof.push({ch:ch.value,ex:ex.value,des:des.value,d,t});
renderProfil();
}
function sampleProfil(){
prof=[
{ch:0,ex:18,des:17.8,d:0.2,t:"CUT"},
{ch:25,ex:17.9,des:17.7,d:0.2,t:"CUT"},
{ch:50,ex:17.6,des:17.7,d:-0.1,t:"FILL"}
];
renderProfil();
}
function renderProfil(){
tprofil.innerHTML="<tr><th>No</th><th>Ch</th><th>Ex</th><th>Des</th><th>Δ</th><th>Tipe</th></tr>";
prof.forEach((p,i)=>{
let r=tprofil.insertRow();
r.insertCell(0).innerHTML=i+1;
r.insertCell(1).innerHTML=p.ch;
r.insertCell(2).innerHTML=p.ex;
r.insertCell(3).innerHTML=p.des;
r.insertCell(4).innerHTML=p.d;
r.insertCell(5).innerHTML=p.t=="CUT"?"<span class='cut'>CUT</span>":"<span class='fill'>FILL</span>";
});
drawChart();
}
function calcVol(){
let w=+lebar.value,i=+interval.value,cut=0,fill=0;
for(let x=1;x<prof.length;x++){
let A1=Math.abs(prof[x-1].d)*w;
let A2=Math.abs(prof[x].d)*w;
let v=(A1+A2)/2*i;
if(prof[x].t=="CUT")cut+=v; else fill+=v;
}
total.innerHTML="Cut="+cut.toFixed(2)+" Fill="+fill.toFixed(2);
}
function resetProfil(){ prof=[]; renderProfil(); }

function drawChart(){
let ctx=document.getElementById("chart");
let labels=prof.map(p=>p.ch);
let ex=prof.map(p=>p.ex);
let des=prof.map(p=>p.des);

if(chart) chart.destroy();
chart=new Chart(ctx,{
type:'line',
data:{labels,datasets:[
{label:"Existing",data:ex},
{label:"Design",data:des}
]}
});
}
</script>

</body>
</html>
